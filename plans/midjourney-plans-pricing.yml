specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Midjourney
providerId: midjourney
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AI
  - Image Generation
  - Generative AI
  - Subscription
description: Midjourney is sold as a tiered consumer subscription (Basic, Standard, Pro, Mega) with
  Fast GPU minutes and optional Relax (queue) and Stealth (private generations) modes. There is no
  publicly metered API — generations are produced via the Midjourney web application or Discord bot.
  Pricing tiers are documented on docs.midjourney.com but the page returns 403 to automated fetches;
  prices below are not reconciled live and should be confirmed against the live page.
sources:
  - https://docs.midjourney.com
notes: docs.midjourney.com refused automated fetches (403). Reconciliation deferred — confirm tier
  prices, Fast GPU minutes, Relax mode, and Stealth eligibility from the live plan page.
plans:
  - id: midjourney-basic
    name: Basic Plan
    type: subscription
    description: Entry consumer subscription. Fast GPU minutes only; no unlimited Relax mode.
    entries:
      - label: Monthly subscription
        name: basic_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://docs.midjourney.com
        userMultiplied: true
      - label: Fast GPU minutes
        name: basic_fast
        type: quota
        metric: gpu-minute
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Fast GPU access
      - name: Member gallery access
      - name: Optional usage rights for personal use
  - id: midjourney-standard
    name: Standard Plan
    type: subscription
    description: Mid-tier consumer subscription with unlimited Relax (queued) generations on top of
      monthly Fast GPU minutes.
    entries:
      - label: Monthly subscription
        name: standard_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://docs.midjourney.com
        userMultiplied: true
      - label: Fast GPU minutes
        name: standard_fast
        type: quota
        metric: gpu-minute
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Relax mode
        name: standard_relax
        type: quota
        metric: gpu-minute
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Fast GPU + Unlimited Relax
      - name: Commercial usage rights
  - id: midjourney-pro
    name: Pro Plan
    type: subscription
    description: Power-user subscription. Adds Stealth Mode (private generations) on top of higher
      Fast GPU monthly inclusion.
    entries:
      - label: Monthly subscription
        name: pro_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://docs.midjourney.com
        userMultiplied: true
      - label: Stealth mode
        name: pro_stealth
        type: quota
        metric: feature
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Stealth Mode (private generations)
      - name: Higher concurrent jobs
      - name: Commercial usage rights
  - id: midjourney-mega
    name: Mega Plan
    type: subscription
    description: Highest-volume consumer plan. Largest monthly Fast GPU allotment and full Stealth.
    entries:
      - label: Monthly subscription
        name: mega_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://docs.midjourney.com
        userMultiplied: true
    elements:
      - name: Largest Fast GPU allotment
      - name: Stealth Mode
      - name: Higher concurrent jobs
      - name: Commercial usage rights
  - id: midjourney-annual-discount
    name: Annual billing
    type: subscription
    description: All consumer plans available with annual billing at a discount (typically 20% off
      monthly equivalent).
    entries:
      - label: Annual discount
        name: annual_discount
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see https://docs.midjourney.com
        userMultiplied: true
    elements:
      - name: Discount applied to all tiers
maintainers: []
