meters:
  - name: subscription_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - tier
      - billing_cadence
  - name: fast_gpu_minutes_consumed
    unit: gpu-minute
    aggregation: sum
    dimensions:
      - account
      - tier
  - name: relax_gpu_minutes_consumed
    unit: gpu-minute
    aggregation: sum
    dimensions:
      - account
      - tier
  - name: fast_topup_purchases
    unit: gpu-minute
    aggregation: sum
    dimensions:
      - account
principles:
  - name: Visibility
    description: Track Fast GPU minutes consumed via the Midjourney account info command (e.g.
      /info on Discord); inspect monthly invoice for tier and any Fast top-up purchases.
  - name: Allocation
    description: Allocate seats by user/team; Stealth-mode usage may indicate an enterprise / brand
      project worth tagging separately for chargeback.
  - name: Optimization
    description: Move heavy users to higher tiers (better $/minute) before paying top-ups; rely on
      Relax mode for non-urgent ideation; downgrade when Fast minutes consistently underused.
  - name: Accountability
    description: Designate a creative-team owner per seat; review monthly Fast-minute usage versus
      tier entitlement.
